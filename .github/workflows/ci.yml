name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - name: Run tests
        run: cargo test --workspace 2>&1 | tee test-output.txt
      - run: cargo doc --no-deps -p wavekat-tts --all-features
      - name: Job summary
        if: always()
        run: |
          echo "## Check" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          rustc --version >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f test-output.txt ]; then
            echo "### Test Results" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E '^test result:|^running' test-output.txt >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  features:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - ""
          - "qwen3-tts"
          - "cosyvoice"
          - "qwen3-tts,cosyvoice"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test -p wavekat-tts --no-default-features --features "${{ matrix.features }}"
