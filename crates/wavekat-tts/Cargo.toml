[package]
name = "wavekat-tts"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Unified text-to-speech for voice pipelines with multiple backend support"
keywords = ["tts", "speech", "audio", "voice", "text-to-speech"]
categories = ["multimedia::audio"]

[features]
default = []

# Local inference backends
kokoro = ["dep:ort", "dep:ndarray"]

# API backends
elevenlabs = ["dep:reqwest", "dep:tokio"]
openai = ["dep:reqwest", "dep:tokio"]

[dependencies]
wavekat-core = "0.0.3"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Local inference (optional)
ort = { version = "2.0.0-rc.12", optional = true }
ndarray = { version = "0.17", optional = true }

# HTTP API backends (optional)
reqwest = { version = "0.12", features = ["json"], optional = true }
tokio = { version = "1", features = ["rt", "macros"], optional = true }

[dev-dependencies]
hound = "3.5"
tokio = { version = "1", features = ["full"] }
